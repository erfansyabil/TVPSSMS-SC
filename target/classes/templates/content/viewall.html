<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Content</title>
    <!-- Bootstrap CSS -->
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-bg: #f8fafc;
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            background: linear-gradient(180deg, var(--sidebar-bg) 0%, #0f172a 100%);
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .sidebar .nav-link {
            color: #cbd5e1 !important;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.2s ease;
            padding: 12px 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar .nav-link:hover {
            background-color: var(--sidebar-hover);
            color: #ffffff !important;
            transform: translateX(5px);
        }

        .sidebar .nav-link i {
            font-size: 1.2rem;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.2);
            padding: 3px;
        }

        /* Main Content Styling */
        .main-content {
            padding: 40px;
        }

        h1.page-title {
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
            margin-bottom: 24px;
        }

        /* Card container styling */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        /* Individual card styling */
        .content-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
        }

        /* Video styling */
        .video-embed {
            width: 100%;
            height: 200px;
            border: none;
            background-color: #0f172a;
        }

        /* Card details */
        .card-details {
            padding: 24px;
            flex-grow: 1;
            border-bottom: 1px solid #f1f5f9;
        }

        .content-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .content-description {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .content-meta {
            font-size: 0.85rem;
            color: #64748b;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        /* Actions section */
        .card-actions {
            padding: 16px 24px;
            background-color: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-link {
            text-decoration: none;
            color: var(--accent-color);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .action-link:hover {
            color: var(--accent-hover);
        }
    </style>
</head>
<body>
<div class="container-fluid p-0">
  <div class="row g-0">
    <!-- Sidebar -->
    <div class="col-md-2 sidebar min-vh-100 position-relative" th:if="${role == 'ROLE_STUDENT'}" th:replace="~{student/index.html :: sidebar}"></div>
    <!-- If we need other sidebars for other roles, keeping original structure -->
    <div class="col-md-2 bg-primary text-white min-vh-100" th:if="${role == 'ROLE_TEACHER'}" th:include="~{/teacher/index.html :: sidebar}"></div>
    <div class="col-md-2 bg-dark text-white min-vh-100" th:if="${role == 'ROLE_ADMIN'}" th:include="~{/admin/index.html :: sidebar}"></div>

    <!-- Main Content -->
    <div class="col-md-10 bg-light">
      <div class="main-content">
        
        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="rounded-circle bg-primary bg-opacity-10 p-3 text-primary">
                <i class="bi bi-collection-play fs-2"></i>
            </div>
            <h1 class="page-title mb-0">Video Content</h1>
        </div>
        
        <div class="card-container">
            <div class="content-card" th:each="content : ${contents}">
                <iframe 
                    class="video-embed"
                    th:src="${content.link}" 
                    allowfullscreen>
                </iframe>
                <div class="card-details">
                    <h2 class="content-title" th:text="${content.contentTitle}"></h2>
                    <p class="content-description" th:text="${content.contentDescription}"></p>
                    <div class="content-meta">
                        <div class="meta-item">
                            <i class="bi bi-calendar3"></i> <span th:text="${content.contentUploadDate}"></span>
                        </div>
                        <div class="meta-item">
                            <i class="bi bi-tag"></i> <span class="badge bg-secondary bg-opacity-10 text-secondary border" th:text="${content.contentType}"></span>
                        </div>
                        <div class="meta-item">
                            <i class="bi bi-person"></i> <span th:text="${content.owner}"></span>
                        </div>
                    </div>
                </div>
                <div class="card-actions">
                    <span class="text-muted small">Program #<span th:text="${content.programID}"></span></span>
                    <a class="action-link" th:href="@{/content/{contentID}(contentID=${content.contentID})}">
                        Watch Now <i class="bi bi-play-circle-fill"></i>
                    </a>
                </div>
            </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js}"></script>

<!-- YouTube Embed Fix Script -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const iframes = document.querySelectorAll('.video-embed');
        iframes.forEach(iframe => {
            let url = iframe.src;
            if (url && (url.includes("youtube.com/watch?v=") || url.includes("youtu.be/"))) {
                let videoId = "";
                if (url.includes("youtube.com/watch?v=")) {
                    videoId = url.split("v=")[1];
                } else if (url.includes("youtu.be/")) {
                    videoId = url.split("youtu.be/")[1];
                }
                
                let paramsPosition = videoId.indexOf('&');
                if(paramsPosition === -1) paramsPosition = videoId.indexOf('?');
                
                if(paramsPosition !== -1) {
                  videoId = videoId.substring(0, paramsPosition);
                }
                
                if (videoId) {
                    iframe.src = "https://www.youtube.com/embed/" + videoId;
                }
            }
        });
    });
</script>
</body>
</html>
