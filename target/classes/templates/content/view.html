<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Content</title>
    <!-- Bootstrap CSS -->
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-bg: #f8fafc;
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            background: linear-gradient(180deg, var(--sidebar-bg) 0%, #0f172a 100%);
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .sidebar .nav-link {
            color: #cbd5e1 !important;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.2s ease;
            padding: 12px 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar .nav-link:hover {
            background-color: var(--sidebar-hover);
            color: #ffffff !important;
            transform: translateX(5px);
        }

        .sidebar .nav-link i {
            font-size: 1.2rem;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.2);
            padding: 3px;
        }

        /* Main Content Styling */
        .main-content {
            padding: 40px;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            overflow: hidden;
        }

        .video-embed {
            width: 100%;
            height: 450px;
            border: none;
            background-color: #0f172a;
        }

        .content-info-card {
            padding: 30px;
        }

        h2 {
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
            margin-bottom: 15px;
        }

        .info-row {
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-outline-custom {
            color: #64748b;
            border: 1px solid #cbd5e1;
            background: white;
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-outline-custom:hover {
            background: #f1f5f9;
            color: var(--text-main);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="container-fluid p-0">
  <div class="row g-0">
    <!-- Sidebar -->
    <div class="col-md-2 sidebar min-vh-100 position-relative" th:if="${role == 'ROLE_STUDENT'}" th:replace="~{student/index.html :: sidebar}"></div>
    <div class="col-md-2 bg-primary text-white min-vh-100" th:if="${role == 'ROLE_TEACHER'}" th:include="~{/teacher/index.html :: sidebar}"></div>
    <div class="col-md-2 bg-dark text-white min-vh-100" th:if="${role == 'ROLE_ADMIN'}" th:include="~{/admin/index.html :: sidebar}"></div>

    <!-- Main Content -->
    <div class="col-md-10 bg-light">
      <div class="main-content">
        
        <!-- Header -->
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div class="d-flex align-items-center gap-3">
                <div class="rounded-circle bg-primary bg-opacity-10 p-3 text-primary">
                    <i class="bi bi-play-btn fs-2"></i>
                </div>
                <h1 class="mb-0 fw-bold">Watch Content</h1>
            </div>
            <a th:href="@{/content/}" class="btn-outline-custom">
                <i class="bi bi-arrow-left"></i> Back to Content
            </a>
        </div>

        <div class="row g-4">
            <!-- Video Player Column -->
            <div class="col-lg-8">
                <div class="glass-card shadow-sm">
                    <iframe 
                        class="video-embed"
                        th:src="${content.link}"
                        allowfullscreen>
                    </iframe>
                    <div class="p-4">
                        <h2 th:text="${content.contentTitle}"></h2>
                        <p class="text-muted fs-5 mb-0" th:text="${content.contentDescription}"></p>
                    </div>
                </div>
            </div>

            <!-- Content Details Column -->
            <div class="col-lg-4">
                <div class="glass-card content-info-card h-100">
                    <h4 class="fw-bold mb-4">Details</h4>
                    
                    <div class="info-row">
                        <span class="text-muted"><i class="bi bi-hash me-2"></i>Content ID</span>
                        <strong th:text="${content.contentID}"></strong>
                    </div>
                    
                    <div class="info-row">
                        <span class="text-muted"><i class="bi bi-calendar3 me-2"></i>Upload Date</span>
                        <strong th:text="${content.contentUploadDate}"></strong>
                    </div>
                    
                    <div class="info-row">
                        <span class="text-muted"><i class="bi bi-tag me-2"></i>Type</span>
                        <strong class="text-capitalize" th:text="${content.contentType}"></strong>
                    </div>
                    
                    <div class="info-row">
                        <span class="text-muted"><i class="bi bi-folder2-open me-2"></i>Program ID</span>
                        <strong th:text="${content.programID}"></strong>
                    </div>
                    
                    <div class="info-row">
                        <span class="text-muted"><i class="bi bi-person-circle me-2"></i>Owner</span>
                        <strong th:text="${content.owner}"></strong>
                    </div>
                </div>
            </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js}"></script>

<!-- YouTube Embed Fix Script -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const iframes = document.querySelectorAll('.video-embed');
        iframes.forEach(iframe => {
            let url = iframe.src;
            if (url && (url.includes("youtube.com/watch?v=") || url.includes("youtu.be/"))) {
                let videoId = "";
                if (url.includes("youtube.com/watch?v=")) {
                    videoId = url.split("v=")[1];
                } else if (url.includes("youtu.be/")) {
                    videoId = url.split("youtu.be/")[1];
                }
                
                let paramsPosition = videoId.indexOf('&');
                if(paramsPosition === -1) paramsPosition = videoId.indexOf('?');
                
                if(paramsPosition !== -1) {
                  videoId = videoId.substring(0, paramsPosition);
                }
                
                if (videoId) {
                    iframe.src = "https://www.youtube.com/embed/" + videoId;
                }
            }
        });
    });
</script>
</body>
</html>
