<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Registration Form</title>
    <!-- Bootstrap CSS -->
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-bg: #f8fafc;
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            background: linear-gradient(180deg, var(--sidebar-bg) 0%, #0f172a 100%);
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .sidebar .nav-link {
            color: #cbd5e1 !important;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.2s ease;
            padding: 12px 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar .nav-link:hover {
            background-color: var(--sidebar-hover);
            color: #ffffff !important;
            transform: translateX(5px);
        }

        .sidebar .nav-link i {
            font-size: 1.2rem;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.2);
            padding: 3px;
        }

        /* Main Content Styling */
        .main-content {
            padding: 40px;
        }

        /* Cards */
        .glass-card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            padding: 35px;
        }

        h2 {
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
            margin-bottom: 24px;
        }

        /* Form Controls */
        .form-label {
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        .form-control:focus, .form-select:focus {
            background-color: #ffffff;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-primary {
            background-color: var(--accent-color);
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }
        
        .info-row {
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
<div class="container-fluid p-0">
  <div class="row g-0">
    <!-- Use the new sidebar fragment from student/index.html -->
    <div class="col-md-2 sidebar min-vh-100 position-relative" th:replace="~{student/index.html :: sidebar}"></div>
   
    <!-- Main Content -->
    <div class="col-md-10 bg-light">
      <div class="main-content">
        
        <div class="glass-card mx-auto" style="max-width: 800px;">
            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="rounded-circle bg-primary bg-opacity-10 p-3 text-primary">
                    <i class="bi bi-person-vcard fs-2"></i>
                </div>
                <h2 class="mb-0">Crew Registration</h2>
            </div>
            
            <!-- Show message if already registered -->
            <div th:if="${alreadyRegistered}">
                <div class="alert alert-success d-flex align-items-center mb-4 border-0 shadow-sm" style="background-color: #ecfdf5; color: #065f46; border-radius: 12px;">
                    <i class="bi bi-check-circle-fill fs-4 me-3"></i>
                    <div>You have successfully registered as a crew member!</div>
                </div>
                
                <div class="mt-4">
                    <div class="info-row d-flex justify-content-between align-items-center">
                        <span class="text-muted fw-medium">Name</span>
                        <strong th:text="${crew.name}" class="text-end"></strong>
                    </div>
                    <div class="info-row d-flex justify-content-between align-items-center">
                        <span class="text-muted fw-medium">Email</span>
                        <strong th:text="${crew.email}" class="text-end"></strong>
                    </div>
                    <div class="info-row d-flex justify-content-between align-items-center">
                        <span class="text-muted fw-medium">Position</span>
                        <strong th:text="${crew.position}" class="text-end text-capitalize"></strong>
                    </div>
                    <div class="info-row d-flex justify-content-between align-items-center">
                        <span class="text-muted fw-medium">Year</span>
                        <strong th:text="${crew.year}" class="text-end"></strong>
                    </div>
                </div>
            </div>

            <!-- Show the form if not registered -->
            <form th:if="!${alreadyRegistered}" th:action="@{/crew/register}" method="post">
                <div class="row g-4">
                    <div class="col-md-12">
                        <label for="name" class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="name" name="name" placeholder="Enter your full name" required>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="phoneNo" class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-telephone"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="phoneNo" name="phoneNo" placeholder="Enter your phone number" required>
                        </div>
                    </div>
                    
                    <div class="col-md-8">
                        <label for="position" class="form-label">Preferred Position</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-briefcase"></i></span>
                            <select class="form-select border-start-0 ps-0" id="position" name="position" required>
                                <option value="" disabled selected>Select position</option>
                                <option value="multimedia">Multimedia Crew</option>
                                <option value="shooting">Shooting Crew</option>
                                <option value="production">Production Crew</option>
                                <option value="documentation">Documentation Crew</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="col-md-4">
                        <label for="year" class="form-label">Year of Study</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-calendar3"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="year" name="year" placeholder="e.g. 2" required>
                        </div>
                    </div>
                </div>
                
                <hr class="my-5 border-secondary opacity-10">
                
                <div class="d-flex justify-content-end gap-3">
                    <a th:href="@{/users/student}" class="btn btn-light px-4 py-2 text-muted fw-medium border">Cancel</a>
                    <button type="submit" class="btn btn-primary d-flex align-items-center gap-2">
                        Submit Registration <i class="bi bi-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
